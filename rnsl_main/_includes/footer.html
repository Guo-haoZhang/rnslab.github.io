<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">

    <h2 class="footer-heading" style="margin-bottom: 0;">{{ site.footer_short_title | escape }}</h2>

    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <ul class="contact-list">
          <li class="p-name">{{ site.footer_subtitle | escape }}</li>
        </ul>
      </div>

      <div class="footer-col footer-col-2">
        {%- include social.html -%}
      </div>

      <div class="footer-col footer-col-3">
        <p style="margin: 0;">{{ site.footer_dept | escape }}<br>{{ site.footer_univ | escape }}</p>
      </div>
    </div>

  </div>

</footer>
